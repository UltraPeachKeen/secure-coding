{% extends "base.html" %}{% block content %}<h1>상품 관리</h1><div class="table-responsive"><table class="table"><thead><tr><th>ID</th><th>상품</th><th>판매자</th><th>상태</th><th>신고</th><th>작업</th></tr></thead><tbody>{% for product in products %}<tr><td>{{ product.id }}</td><td><a href="{{ url_for('products.detail', product_id=product.id) }}">{{ product.title }}</a></td><td>{{ product.seller.username }}</td><td>{{ product.status }}</td><td>{{ product.report_count }}</td><td><form method="post" action="{{ url_for('admin.product_status', product_id=product.id) }}">{{ action_form.csrf_token }}<input type="hidden" name="action" value="{{ 'blocked' if product.status == 'active' else 'active' }}"><button class="btn btn-sm btn-outline-warning">{{ '차단' if product.status == 'active' else '복구' }}</button></form></td></tr>{% endfor %}</tbody></table></div>{% endblock %}
