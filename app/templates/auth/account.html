{% extends "base.html" %}
{% block title %}마이페이지{% endblock %}
{% block content %}
<h1>마이페이지</h1>
<dl class="row">
  <dt class="col-sm-3">아이디</dt><dd class="col-sm-9">{{ current_user.username }}</dd>
  <dt class="col-sm-3">소개</dt><dd class="col-sm-9">{{ current_user.bio or '없음' }}</dd>
  <dt class="col-sm-3">잔액</dt><dd class="col-sm-9">{{ '{:,}'.format(current_user.balance) }}원</dd>
  <dt class="col-sm-3">상태</dt><dd class="col-sm-9">{{ current_user.status }}</dd>
</dl>
<a class="btn btn-primary" href="{{ url_for('auth.edit_profile') }}">소개글 수정</a>
<a class="btn btn-outline-primary" href="{{ url_for('auth.change_password') }}">비밀번호 변경</a>
{% endblock %}
