<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}Tiny Market{% endblock %}</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="{{ url_for('static', filename='style.css') }}" rel="stylesheet">
</head>
<body>
<nav class="navbar navbar-expand-lg bg-dark navbar-dark mb-4">
  <div class="container">
    <a class="navbar-brand" href="{{ url_for('products.index') }}">Tiny Market</a>
    <div class="navbar-nav flex-row flex-wrap gap-3 align-items-center">
      {% if current_user.is_authenticated %}
        <a class="nav-link" href="{{ url_for('products.create') }}">상품 등록</a>
        <a class="nav-link" href="{{ url_for('products.mine') }}">내 상품</a>
        <a class="nav-link" href="{{ url_for('chat.global_chat') }}">전체 채팅</a>
        <a class="nav-link" href="{{ url_for('transfers.index') }}">송금</a>
        <a class="nav-link" href="{{ url_for('auth.account') }}">마이페이지</a>
        {% if current_user.is_admin %}<a class="nav-link" href="{{ url_for('admin.dashboard') }}">관리자</a>{% endif %}
        <form method="post" action="{{ url_for('auth.logout') }}" class="d-inline">
          <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
          <button class="btn btn-sm btn-outline-light" type="submit">로그아웃</button>
        </form>
      {% else %}
        <a class="nav-link" href="{{ url_for('auth.login') }}">로그인</a>
        <a class="nav-link" href="{{ url_for('auth.register') }}">회원가입</a>
      {% endif %}
    </div>
  </div>
</nav>
<main class="container pb-5">
  {% for category, message in get_flashed_messages(with_categories=true) %}
    <div class="alert alert-{{ category }}" role="alert">{{ message }}</div>
  {% endfor %}
  {% block content %}{% endblock %}
</main>
<script src="{{ url_for('static', filename='app.js') }}" defer></script>
</body>
</html>
